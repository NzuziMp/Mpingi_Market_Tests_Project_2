# ─────────────────────────────────────────────────────────────────────────────
# SonarQube Configuration — Mpingi Market
# Project: INF-396-15-TU  |  Student: Nzuzi Mpingi Doudou
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=Mpingi-Market-Tests-Project
sonar.projectName=Mpingi Market Tests Project
sonar.projectVersion=1.0.0
sonar.organization=mpingi

# Source and test directories
sonar.sources=src
sonar.tests=src/tests
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  src/vite-env.d.ts,\
  src/main.tsx,\
  src/lib/database.types.ts,\
  tests/functional/**

sonar.test.inclusions=src/tests/**/*.test.ts,src/tests/**/*.test.tsx

# Language and encoding
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Coverage report (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=\
  src/tests/**,\
  src/vite-env.d.ts,\
  src/main.tsx,\
  src/lib/database.types.ts

# TypeScript-specific
sonar.typescript.tsconfigPath=tsconfig.app.json

# ─────────────────────────────────────────────────────────────────────────────
# Quality Gate Thresholds
# The pipeline will FAIL if any of these conditions are violated.
# ─────────────────────────────────────────────────────────────────────────────
# Minimum test coverage:              60%
# Maximum allowed code duplication:    5%
# No new CRITICAL or BLOCKER issues
# Cyclomatic complexity per function: <= 10
# ─────────────────────────────────────────────────────────────────────────────

# Duplication
sonar.cpd.exclusions=src/lib/database.types.ts

# SCM
sonar.scm.provider=git
