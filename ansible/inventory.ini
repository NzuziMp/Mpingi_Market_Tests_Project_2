# Ansible Inventory — Mpingi Market
# ─────────────────────────────────────────────────────────────────────────────
# Replace the IP/hostname below with your actual production server address.
# This file should be kept out of version control for security reasons.
# ─────────────────────────────────────────────────────────────────────────────

[production]
mpingi-prod ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_port=22

[staging]
mpingi-staging ansible_host=YOUR_STAGING_IP ansible_user=ubuntu ansible_port=22

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
